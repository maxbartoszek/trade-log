{% extends "base.html" %}
{% block content %}

<div style="margin-bottom:1.5rem">
  <a href="{{ url_for('dashboard') }}" class="btn btn-ghost" style="font-size:11px">← Back</a>
</div>

<div class="page-header">
  <div>
    <div class="page-title">Log New Trade</div>
    <div class="page-subtitle">Document your entry, reasoning, and analysis</div>
  </div>
</div>

<form method="POST" action="{{ url_for('add_trade') }}">

  <div class="form-section">
    <div class="form-section-title">Trade Data</div>
    <div class="form-grid three">
      <div class="form-group">
        <label class="form-label">Ticker Symbol *</label>
        <input type="text" name="ticker" class="form-control" placeholder="NVDA" required style="text-transform:uppercase">
      </div>
      <div class="form-group">
        <label class="form-label">Position Type *</label>
        <select name="position_type" class="form-control" required>
          <option value="long">Long</option>
          <option value="short">Short</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Status</label>
        <select name="status" class="form-control">
          <option value="open">Open</option>
          <option value="closed">Closed</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Entry Price *</label>
        <input type="number" name="entry_price" class="form-control" placeholder="0.00" step="0.01" required>
      </div>
      <div class="form-group">
        <label class="form-label">Exit Price</label>
        <input type="number" name="exit_price" class="form-control" placeholder="0.00" step="0.01">
      </div>
      <div class="form-group">
        <label class="form-label">Position Size ($)</label>
        <input type="number" name="position_size" class="form-control" placeholder="10000" step="0.01">
      </div>
      <div class="form-group">
        <label class="form-label">Entry Date</label>
        <input type="date" name="entry_date" class="form-control">
      </div>
      <div class="form-group">
        <label class="form-label">Exit Date</label>
        <input type="date" name="exit_date" class="form-control">
      </div>
      <div class="form-group">
        <label class="form-label">Sector</label>
        <input type="text" name="sector" class="form-control" placeholder="Technology">
      </div>
      <div class="form-group form-full">
        <label class="form-label">Strategy / Setup</label>
        <input type="text" name="strategy" class="form-control" placeholder="Breakout, Earnings Play, Trend Follow...">
      </div>
    </div>
  </div>

  <div class="form-section">
    <div class="form-section-title">Investment Thesis</div>
    <div class="form-grid">
      <div class="form-group form-full">
        <label class="form-label">Thesis</label>
        <textarea name="thesis" class="form-control" placeholder="Why are you making this trade? What's the core investment case?" rows="4"></textarea>
      </div>
      <div class="form-group">
        <label class="form-label">Catalyst</label>
        <textarea name="catalyst" class="form-control" placeholder="What specific event or catalyst could drive the price movement?"></textarea>
      </div>
      <div class="form-group">
        <label class="form-label">Risk Factors</label>
        <textarea name="risk_factors" class="form-control" placeholder="What could go wrong? What are the main risks?"></textarea>
      </div>
      <div class="form-group form-full">
        <label class="form-label">Confidence Level: <span id="conf-display">5</span>/10</label>
        <div class="confidence-row">
          <input type="range" name="confidence_level" id="confidence_slider" min="1" max="10" value="5" oninput="document.getElementById('conf-display').textContent=this.value">
        </div>
      </div>
    </div>
  </div>

  <div class="form-section">
    <div class="form-section-title">Post-Trade Analysis <span style="color:var(--text-dim);font-weight:400">(optional — fill in after trade closes)</span></div>
    <div class="form-grid">
      <div class="form-group form-full">
        <label class="form-label">Post-Trade Review</label>
        <textarea name="post_trade_review" class="form-control" placeholder="How did the trade go? Was your thesis right?"></textarea>
      </div>
      <div class="form-group">
        <label class="form-label">Mistakes</label>
        <textarea name="mistakes" class="form-control" placeholder="What did you do wrong or could have done better?"></textarea>
      </div>
      <div class="form-group">
        <label class="form-label">Lessons Learned</label>
        <textarea name="lessons" class="form-control" placeholder="What will you carry forward from this trade?"></textarea>
      </div>
    </div>
  </div>

  <div style="display:flex;gap:1rem;justify-content:flex-end">
    <a href="{{ url_for('dashboard') }}" class="btn btn-ghost">Cancel</a>
    <button type="submit" class="btn btn-accent">Log Trade →</button>
  </div>

</form>
{% endblock %}
