{% extends "base.html" %}
{% block title %}Register — TradeLog{% endblock %}
{% block content %}
<div class="auth-container">
  <div style="text-align:center;margin-bottom:2.5rem">
    <div style="font-family:var(--mono);font-size:22px;font-weight:700;color:var(--accent);letter-spacing:0.1em">▶ TRADELOG</div>
    <div style="font-size:12px;color:var(--text-dim);margin-top:4px">Personal trade journal & performance tracker</div>
  </div>
  <div class="auth-box">
    <div class="auth-title">Create Account</div>
    <div class="auth-sub">Start tracking your trades</div>
    <form method="POST">
      <div class="form-group" style="margin-bottom:1rem">
        <label class="form-label">Username</label>
        <input type="text" name="username" class="form-control" required autofocus>
      </div>
      <div class="form-group" style="margin-bottom:1rem">
        <label class="form-label">Email</label>
        <input type="email" name="email" class="form-control" required>
      </div>
      <div class="form-group" style="margin-bottom:1.5rem">
        <label class="form-label">Password</label>
        <input type="password" name="password" class="form-control" required minlength="6">
      </div>
      <button type="submit" class="btn btn-accent" style="width:100%;justify-content:center">Create Account →</button>
    </form>
  </div>
  <div class="auth-footer">
    Already have an account? <a href="{{ url_for('login') }}">Sign in</a>
  </div>
</div>
{% endblock %}
