<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Trade Log</title>
  <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&display=swap" rel="stylesheet">
  <style>
    :root {
      /* Dark mode (default) */
      --bg: #0a0b0d;
      --bg2: #111318;
      --bg3: #181c24;
      --border: #1e2330;
      --border2: #2a3040;
      --text: #d8e0f0;
      --text-dim: #8a96b0;
      --text-bright: #eef2ff;
      --accent: #00e5a0;
      --accent-dim: rgba(0,229,160,0.12);
      --accent-glow: rgba(0,229,160,0.25);
      --red: #ff4d6a;
      --red-dim: rgba(255,77,106,0.12);
      --yellow: #f5c842;
      --yellow-dim: rgba(245,200,66,0.12);
      --blue: #4d9fff;
      --mono: 'Space Mono', monospace;
      --sans: 'DM Sans', sans-serif;
      --nav-bg: rgba(10,11,13,0.92);
      --grid-line: rgba(0,229,160,0.015);
    }

    /* Light mode */
    html.light {
      --bg: #f4f6fa;
      --bg2: #ffffff;
      --bg3: #eaecf4;
      --border: #d4d9e8;
      --border2: #bcc4d8;
      --text: #1e2a45;
      --text-dim: #4a5570;
      --text-bright: #1a2040;
      --accent: #00a870;
      --accent-dim: rgba(0,168,112,0.10);
      --accent-glow: rgba(0,168,112,0.22);
      --red: #d93050;
      --red-dim: rgba(217,48,80,0.10);
      --yellow: #c49a00;
      --yellow-dim: rgba(196,154,0,0.10);
      --blue: #2878d6;
      --nav-bg: rgba(244,246,250,0.94);
      --grid-line: rgba(0,168,112,0.04);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      font-size: 14px;
      line-height: 1.6;
      min-height: 100vh;
    }

    /* Grid noise texture overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(var(--grid-line) 1px, transparent 1px),
        linear-gradient(90deg, var(--grid-line) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    /* ---- NAV ---- */
    nav {
      position: sticky;
      top: 0;
      z-index: 100;
      background: var(--nav-bg);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      padding: 0 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 52px;
    }

    .nav-brand {
      font-family: var(--mono);
      font-size: 13px;
      font-weight: 700;
      color: var(--accent);
      text-decoration: none;
      letter-spacing: 0.1em;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .nav-brand::before {
      content: '▶';
      font-size: 9px;
      color: var(--accent);
    }

    .nav-links {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .nav-links a {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--text-dim);
      text-decoration: none;
      padding: 6px 12px;
      border-radius: 4px;
      letter-spacing: 0.05em;
      transition: all 0.15s;
    }

    .nav-links a:hover { color: var(--text-bright); background: var(--bg3); }

    .nav-links .btn-primary {
      background: var(--accent-dim);
      color: var(--accent);
      border: 1px solid rgba(0,229,160,0.3);
    }
    .nav-links .btn-primary:hover {
      background: var(--accent);
      color: var(--bg);
    }

    .nav-user {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--text-dim);
    }

    /* ---- MAIN CONTENT ---- */
    main {
      position: relative;
      z-index: 1;
      max-width: 1100px;
      margin: 0 auto;
      padding: 2rem 2rem 4rem;
    }

    /* ---- FLASH MESSAGES ---- */
    .flash-messages { margin-bottom: 1.5rem; }
    .flash {
      font-family: var(--mono);
      font-size: 11px;
      padding: 10px 14px;
      border-radius: 4px;
      margin-bottom: 8px;
      border-left: 3px solid;
    }
    .flash.success { background: var(--accent-dim); border-color: var(--accent); color: var(--accent); }
    .flash.error { background: var(--red-dim); border-color: var(--red); color: var(--red); }
    .flash.info { background: var(--yellow-dim); border-color: var(--yellow); color: var(--yellow); }

    /* ---- PAGE HEADER ---- */
    .page-header {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      margin-bottom: 2rem;
      padding-bottom: 1.5rem;
      border-bottom: 1px solid var(--border);
    }
    .page-title {
      font-family: var(--mono);
      font-size: 20px;
      font-weight: 700;
      color: var(--text-bright);
      letter-spacing: -0.01em;
    }
    .page-subtitle {
      font-size: 12px;
      color: var(--text-dim);
      margin-top: 2px;
    }

    /* ---- STAT CARDS ---- */
    .stats-row {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 1px;
      background: var(--border);
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
      margin-bottom: 2rem;
    }

    .stat-card {
      background: var(--bg2);
      padding: 1.2rem 1.4rem;
    }

    .stat-label {
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 0.1em;
      color: var(--text-dim);
      text-transform: uppercase;
      margin-bottom: 6px;
    }

    .stat-value {
      font-family: var(--mono);
      font-size: 22px;
      font-weight: 700;
      color: var(--text-bright);
    }

    .stat-value.up { color: var(--accent); }
    .stat-value.down { color: var(--red); }

    /* ---- TRADE CARDS ---- */
    .trade-list { display: flex; flex-direction: column; gap: 1px; background: var(--border); border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }

    .trade-card {
      background: var(--bg2);
      padding: 1.2rem 1.6rem;
      display: grid;
      grid-template-columns: 80px 60px 1fr auto auto;
      align-items: center;
      gap: 1.5rem;
      text-decoration: none;
      color: inherit;
      transition: background 0.12s;
      cursor: pointer;
    }

    .trade-card:hover { background: var(--bg3); }

    .trade-ticker {
      font-family: var(--mono);
      font-size: 16px;
      font-weight: 700;
      color: var(--text-bright);
      letter-spacing: 0.05em;
    }

    .trade-side {
      font-family: var(--mono);
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.1em;
      padding: 3px 8px;
      border-radius: 3px;
      width: fit-content;
    }
    .side-long { background: var(--accent-dim); color: var(--accent); border: 1px solid rgba(0,229,160,0.25); }
    .side-short { background: var(--red-dim); color: var(--red); border: 1px solid rgba(255,77,106,0.25); }

    .trade-meta {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .trade-thesis-preview {
      font-size: 12px;
      color: var(--text-dim);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 400px;
    }
    .trade-dates {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--text-dim);
    }

    .trade-prices {
      font-family: var(--mono);
      font-size: 12px;
      color: var(--text-dim);
      text-align: right;
    }

    .trade-return {
      font-family: var(--mono);
      font-size: 18px;
      font-weight: 700;
      min-width: 80px;
      text-align: right;
    }
    .trade-return.up { color: var(--accent); }
    .trade-return.down { color: var(--red); }
    .trade-return.open { color: var(--yellow); font-size: 11px; padding: 4px 8px; background: var(--yellow-dim); border-radius: 3px; }

    /* ---- BUTTONS ---- */
    .btn {
      font-family: var(--mono);
      font-size: 11px;
      letter-spacing: 0.06em;
      padding: 9px 18px;
      border-radius: 5px;
      cursor: pointer;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      border: none;
      transition: all 0.15s;
    }
    .btn-accent { background: var(--accent); color: var(--bg); font-weight: 700; }
    .btn-accent:hover { background: #00ffb3; box-shadow: 0 0 20px var(--accent-glow); }
    .btn-ghost { background: transparent; color: var(--text-dim); border: 1px solid var(--border2); }
    .btn-ghost:hover { color: var(--text-bright); border-color: var(--text-dim); }
    .btn-danger { background: var(--red-dim); color: var(--red); border: 1px solid rgba(255,77,106,0.3); }
    .btn-danger:hover { background: var(--red); color: white; }

    /* ---- FORMS ---- */
    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.5rem;
    }
    .form-grid.three { grid-template-columns: 1fr 1fr 1fr; }
    .form-full { grid-column: 1 / -1; }

    .form-section {
      margin-bottom: 2rem;
    }
    .form-section-title {
      font-family: var(--mono);
      font-size: 11px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 1rem;
      padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    .form-group { display: flex; flex-direction: column; gap: 6px; }
    .form-label {
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-dim);
    }

    .form-control {
      background: var(--bg3);
      border: 1px solid var(--border2);
      border-radius: 5px;
      padding: 9px 12px;
      font-family: var(--mono);
      font-size: 13px;
      color: var(--text-bright);
      outline: none;
      transition: border-color 0.15s;
      width: 100%;
    }
    .form-control:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-dim); }
    .form-control::placeholder { color: var(--text-dim); font-size: 12px; }

    select.form-control option { background: var(--bg3); }

    textarea.form-control { resize: vertical; min-height: 100px; line-height: 1.6; }

    /* Confidence slider */
    .confidence-row { display: flex; align-items: center; gap: 12px; }
    .confidence-row input[type=range] {
      flex: 1;
      accent-color: var(--accent);
      height: 4px;
    }
    .confidence-val {
      font-family: var(--mono);
      font-size: 16px;
      font-weight: 700;
      color: var(--accent);
      min-width: 20px;
    }

    /* ---- DETAIL PAGE ---- */
    .detail-header {
      display: flex;
      align-items: center;
      gap: 1.5rem;
      margin-bottom: 2.5rem;
    }
    .detail-ticker {
      font-family: var(--mono);
      font-size: 48px;
      font-weight: 700;
      color: var(--text-bright);
      letter-spacing: 0.04em;
      line-height: 1;
    }
    .detail-return {
      font-family: var(--mono);
      font-size: 36px;
      font-weight: 700;
      line-height: 1;
    }
    .detail-return.up { color: var(--accent); }
    .detail-return.down { color: var(--red); }

    .detail-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1px;
      background: var(--border);
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
      margin-bottom: 2rem;
    }
    .detail-cell {
      background: var(--bg2);
      padding: 1rem 1.4rem;
    }
    .detail-cell-label {
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 0.1em;
      color: var(--text-dim);
      text-transform: uppercase;
      margin-bottom: 4px;
    }
    .detail-cell-value {
      font-family: var(--mono);
      font-size: 15px;
      color: var(--text-bright);
      font-weight: 700;
    }

    .note-section {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 1.5rem;
      margin-bottom: 1rem;
    }
    .note-section-title {
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 0.75rem;
    }
    .note-text {
      font-family: var(--sans);
      font-size: 14px;
      color: var(--text);
      line-height: 1.8;
    }

    /* Confidence display */
    .confidence-display {
      display: flex;
      gap: 4px;
      margin-top: 4px;
    }
    .conf-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--border2);
    }
    .conf-dot.filled { background: var(--accent); }

    /* Empty state */
    .empty-state {
      text-align: center;
      padding: 5rem 2rem;
      color: var(--text-dim);
    }
    .empty-state-icon {
      font-size: 48px;
      margin-bottom: 1rem;
      opacity: 0.3;
    }
    .empty-state-title {
      font-family: var(--mono);
      font-size: 16px;
      color: var(--text-bright);
      margin-bottom: 0.5rem;
    }

    /* Auth pages */
    .auth-container {
      max-width: 420px;
      margin: 6rem auto;
      padding: 0 1rem;
    }
    .auth-box {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 2.5rem;
    }
    .auth-title {
      font-family: var(--mono);
      font-size: 20px;
      font-weight: 700;
      color: var(--text-bright);
      margin-bottom: 0.25rem;
    }
    .auth-sub {
      font-size: 13px;
      color: var(--text-dim);
      margin-bottom: 2rem;
    }
    .auth-footer {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--text-dim);
      text-align: center;
      margin-top: 1.5rem;
    }
    .auth-footer a { color: var(--accent); text-decoration: none; }

    .badge {
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 0.08em;
      padding: 2px 8px;
      border-radius: 3px;
      text-transform: uppercase;
    }
    .badge-open { background: var(--yellow-dim); color: var(--yellow); border: 1px solid rgba(245,200,66,0.25); }
    .badge-closed { background: var(--bg3); color: var(--text-dim); border: 1px solid var(--border2); }

    .action-row {
      display: flex;
      gap: 0.75rem;
      align-items: center;
    }

    /* ---- THEME TOGGLE ---- */
    .theme-toggle {
      background: var(--bg3);
      border: 1px solid var(--border2);
      border-radius: 20px;
      padding: 4px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 2px;
      transition: all 0.2s;
    }
    .theme-toggle:hover { border-color: var(--accent); }

    .toggle-option {
      font-family: var(--mono);
      font-size: 10px;
      padding: 4px 10px;
      border-radius: 14px;
      color: var(--text-dim);
      transition: all 0.18s;
      user-select: none;
      letter-spacing: 0.05em;
    }
    .toggle-option.active {
      background: var(--accent);
      color: var(--bg);
      font-weight: 700;
    }

    @media (max-width: 768px) {
      .stats-row { grid-template-columns: repeat(2, 1fr); }
      .trade-card { grid-template-columns: 1fr auto; grid-template-rows: auto auto; }
      .trade-meta { display: none; }
      .form-grid { grid-template-columns: 1fr; }
      .detail-ticker { font-size: 32px; }
    }
</style>
  <script>
    // Apply saved theme immediately to avoid flash
    (function() {
      if (localStorage.getItem('theme') === 'light') {
        document.documentElement.classList.add('light');
      }
    })();
  </script>
</head>
<body>
  {% if current_user.is_authenticated %}
  <nav>
    <a href="{{ url_for('dashboard') }}" class="nav-brand">TRADELOG</a>
    <div class="nav-links">
      <a href="{{ url_for('dashboard') }}">Dashboard</a>
      <a href="{{ url_for('analytics') }}">Analytics</a>
      <a href="{{ url_for('add_trade') }}" class="btn-primary">+ New Trade</a>
    </div>
    <div style="display:flex;align-items:center;gap:1rem">
      <button class="theme-toggle" id="themeToggle" onclick="toggleTheme()" title="Toggle light/dark mode">
        <span class="toggle-option" id="toggle-dark">DARK</span>
        <span class="toggle-option" id="toggle-light">LIGHT</span>
      </button>
      <span class="nav-user">{{ current_user.username }}</span>
    </div>
  </nav>
  {% endif %}

  <main>
    {% if get_flashed_messages() %}
    <div class="flash-messages">
      {% for category, message in get_flashed_messages(with_categories=true) %}
      <div class="flash {{ category }}">{{ message }}</div>
      {% endfor %}
    </div>
    {% endif %}
    {% block content %}{% endblock %}
  </main>

  <script>
    function toggleTheme() {
      const isLight = document.documentElement.classList.toggle('light');
      localStorage.setItem('theme', isLight ? 'light' : 'dark');
      updateToggleUI(isLight);
    }

    function updateToggleUI(isLight) {
      document.getElementById('toggle-dark').classList.toggle('active', !isLight);
      document.getElementById('toggle-light').classList.toggle('active', isLight);
    }

    // Set initial toggle state on page load
    updateToggleUI(document.documentElement.classList.contains('light'));
  </script>
</body>
</html>
