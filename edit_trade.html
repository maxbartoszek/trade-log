{% extends "base.html" %}
{% block content %}

<div style="margin-bottom:1.5rem">
  <a href="{{ url_for('trade_detail', trade_id=trade.id) }}" class="btn btn-ghost" style="font-size:11px">← Back to Trade</a>
</div>

<div class="page-header">
  <div>
    <div class="page-title">Edit Trade — {{ trade.ticker }}</div>
  </div>
</div>

<form method="POST" action="{{ url_for('edit_trade', trade_id=trade.id) }}">
{% set n = trade.notes %}

  <div class="form-section">
    <div class="form-section-title">Trade Data</div>
    <div class="form-grid three">
      <div class="form-group">
        <label class="form-label">Ticker Symbol *</label>
        <input type="text" name="ticker" class="form-control" value="{{ trade.ticker }}" required style="text-transform:uppercase">
      </div>
      <div class="form-group">
        <label class="form-label">Position Type *</label>
        <select name="position_type" class="form-control" required>
          <option value="long" {% if trade.position_type == 'long' %}selected{% endif %}>Long</option>
          <option value="short" {% if trade.position_type == 'short' %}selected{% endif %}>Short</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Status</label>
        <select name="status" class="form-control">
          <option value="open" {% if trade.status == 'open' %}selected{% endif %}>Open</option>
          <option value="closed" {% if trade.status == 'closed' %}selected{% endif %}>Closed</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Entry Price *</label>
        <input type="number" name="entry_price" class="form-control" value="{{ trade.entry_price }}" step="0.01" required>
      </div>
      <div class="form-group">
        <label class="form-label">Exit Price</label>
        <input type="number" name="exit_price" class="form-control" value="{{ trade.exit_price or '' }}" step="0.01">
      </div>
      <div class="form-group">
        <label class="form-label">Position Size ($)</label>
        <input type="number" name="position_size" class="form-control" value="{{ trade.position_size or '' }}" step="0.01">
      </div>
      <div class="form-group">
        <label class="form-label">Entry Date</label>
        <input type="date" name="entry_date" class="form-control" value="{{ trade.entry_date.strftime('%Y-%m-%d') if trade.entry_date else '' }}">
      </div>
      <div class="form-group">
        <label class="form-label">Exit Date</label>
        <input type="date" name="exit_date" class="form-control" value="{{ trade.exit_date.strftime('%Y-%m-%d') if trade.exit_date else '' }}">
      </div>
      <div class="form-group">
        <label class="form-label">Sector</label>
        <input type="text" name="sector" class="form-control" value="{{ trade.sector or '' }}">
      </div>
      <div class="form-group form-full">
        <label class="form-label">Strategy / Setup</label>
        <input type="text" name="strategy" class="form-control" value="{{ trade.strategy or '' }}">
      </div>
    </div>
  </div>

  <div class="form-section">
    <div class="form-section-title">Investment Thesis</div>
    <div class="form-grid">
      <div class="form-group form-full">
        <label class="form-label">Thesis</label>
        <textarea name="thesis" class="form-control" rows="4">{{ n.thesis if n else '' }}</textarea>
      </div>
      <div class="form-group">
        <label class="form-label">Catalyst</label>
        <textarea name="catalyst" class="form-control">{{ n.catalyst if n else '' }}</textarea>
      </div>
      <div class="form-group">
        <label class="form-label">Risk Factors</label>
        <textarea name="risk_factors" class="form-control">{{ n.risk_factors if n else '' }}</textarea>
      </div>
      <div class="form-group form-full">
        <label class="form-label">Confidence Level: <span id="conf-display">{{ n.confidence_level if n else 5 }}</span>/10</label>
        <div class="confidence-row">
          <input type="range" name="confidence_level" id="confidence_slider" min="1" max="10"
            value="{{ n.confidence_level if n else 5 }}"
            oninput="document.getElementById('conf-display').textContent=this.value">
        </div>
      </div>
    </div>
  </div>

  <div class="form-section">
    <div class="form-section-title">Post-Trade Analysis</div>
    <div class="form-grid">
      <div class="form-group form-full">
        <label class="form-label">Post-Trade Review</label>
        <textarea name="post_trade_review" class="form-control">{{ n.post_trade_review if n else '' }}</textarea>
      </div>
      <div class="form-group">
        <label class="form-label">Mistakes</label>
        <textarea name="mistakes" class="form-control">{{ n.mistakes if n else '' }}</textarea>
      </div>
      <div class="form-group">
        <label class="form-label">Lessons Learned</label>
        <textarea name="lessons" class="form-control">{{ n.lessons if n else '' }}</textarea>
      </div>
    </div>
  </div>

  <div style="display:flex;gap:1rem;justify-content:flex-end">
    <a href="{{ url_for('trade_detail', trade_id=trade.id) }}" class="btn btn-ghost">Cancel</a>
    <button type="submit" class="btn btn-accent">Save Changes →</button>
  </div>
</form>
{% endblock %}
