services:
  - type: web
    name: trade-journal
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: trade-journal-db
          property: connectionString

databases:
  - name: trade-journal-db
    plan: free
